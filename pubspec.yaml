name: tenant_mobile
description: Tenant Portal Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
    sdk: '>=3.4.0 <4.0.0'

dependencies:
    flutter:
        sdk: flutter
    cupertino_icons: ^1.0.8
    dio: ^5.4.3
    flutter_riverpod: ^2.5.1
    go_router: ^14.2.0
    flutter_secure_storage: ^9.2.2
    shared_preferences: ^2.3.1
    reactive_forms: ^17.0.0
    fluttertoast: ^8.2.8
    url_launcher: ^6.3.0
    shimmer: ^3.0.0
    fl_chart: ^0.68.0
    intl: ^0.19.0
    package_info_plus: ^8.0.0

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^4.0.0

flutter:
    uses-material-design: true
    assets:
        - assets/
